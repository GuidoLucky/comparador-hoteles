[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  "PLAYWRIGHT_BROWSERS_PATH=/app/browsers npx playwright install chromium",
  "npx playwright install-deps chromium",
  "find /app/browsers -name 'chrome' 2>/dev/null | head -5 || echo 'not found'"
]

[start]
cmd = "PLAYWRIGHT_BROWSERS_PATH=/app/browsers npm start"
