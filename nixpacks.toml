[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "nss", "at-spi2-atk", "atk", "cups", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXrandr", "xorg.libXfixes", "xorg.libXi", "xorg.libXtst", "mesa", "libgbm", "alsa-lib", "pango", "cairo", "glib", "dbus", "expat", "nspr"]

[phases.install]
cmds = ["npm install", "PLAYWRIGHT_BROWSERS_PATH=/ms-playwright npx playwright install chromium --with-deps"]

[start]
cmd = "PLAYWRIGHT_BROWSERS_PATH=/ms-playwright npm start"
